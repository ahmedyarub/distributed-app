services:
  # Responders (Internal only)
  responder-annotation:
    build:
      context: ../../microservices/responder_mvc_annotation
    networks:
      - internal-net

  responder-router:
    build:
      context: ../../microservices/responder_mvc_router
    networks:
      - internal-net

  responder-webflux:
    build:
      context: ../../microservices/responder_webflux
    networks:
      - internal-net

  # Callers (Internal only, exposed via Kong)
  caller-feign:
    build:
      context: ../../microservices/caller_feign_client
    environment:
      - RESPONDER_URL=http://responder-annotation:9080
    depends_on:
      - responder-annotation
    networks:
      - internal-net

  caller-rest:
    build:
      context: ../../microservices/caller_rest_template
    environment:
      - RESPONDER_URL=http://responder-router:9081
    depends_on:
      - responder-router
    networks:
      - internal-net

  caller-web:
    build:
      context: ../../microservices/caller_web_client
    environment:
      - RESPONDER_URL=http://responder-webflux:9082
    depends_on:
      - responder-webflux
    networks:
      - internal-net

  # Kong API Gateway (Public entry point)
  kong:
    image: kong:3.4-ubuntu
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
    depends_on:
      - caller-feign
      - caller-rest
      - caller-web
    networks:
      - internal-net

networks:
  internal-net:
    driver: bridge